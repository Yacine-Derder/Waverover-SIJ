# PC-only reproducible random-motion recording test: centralized convex.
frame_id: robotics_lab

robot_ids: ["131", "132", "133", "134"]

pose:
  timeout_sec: 0.5
  maximum_snapshot_skew_sec: 0.1

station:
  id: station_0
  position: [0.0, 0.0]

targets_file: targets_smoke_6.yaml

target_dynamics:
  mode: random_priority
  switch_period_sec: 10.0
  priority_weight: 10.0
  background_weight: 1.0
  seed: 2026
  initial_priority_target_id: null
  avoid_immediate_repeat: true

vehicle:
  straight_speed_mps: 0.333333
  turn_radius_m: 0.15
  bank_yaw_rate_rad_s: 2.513274
  turning_path_speed_mps: 0.376991

controller:
  algorithm: convex
  control_period_sec: 1.0
  mpc_horizon: 5
  mpc_max_step_m: 0.333333
  minimum_mpc_lookahead_m: 0.30
  deterministic_seed: 42
  distributed_update_semantics: jacobi

waypoint_dispatch:
  refresh_period_sec: 1.0
  active_waypoint_warning_sec: 10.0

communication:
  ideal_range_m: 1.5
  maximum_range_m: 2.0

safety:
  dry_run: false
  minimum_separation_m: 0.35
  controller_result_timeout_sec: 2.5
  geofence: {x_min: -4.0, x_max: 4.0, y_min: -4.0, y_max: 4.0}

synthetic_mcs:
  mode: random_walk
  seed: 2026
  duration_sec: 120.0
  formation_coupling: independent
  initial_radius_m: 1.0
  connectivity_policy: observe
  segment_duration_min_sec: 1.0
  segment_duration_max_sec: 5.0
  process_speed_std_mps: 0.005
  process_yaw_rate_std_rad_s: 0.01
  measurement_position_std_m: 0.002
  measurement_heading_std_rad: 0.005
  maximum_transition_attempts: 50

recording:
  root_directory: /home/derder/waverover_runs
  profile: core
  storage_id: sqlite3
  pose_source: mcs
  start_synthetic: false

analysis:
  connectivity_alpha: 5.0
  maximum_interpolation_gap_sec: 0.5
