# PC-only example. Communication ranges, geofence, and target coordinates must
# be verified in robotics_lab before any physical experiment.
frame_id: robotics_lab

robot_ids:
  - "131"
  - "132"
  - "133"
  - "134"
  - "135"
  - "136"

pose:
  timeout_sec: 0.5
  maximum_snapshot_skew_sec: 0.1

station:
  id: station_0
  position: [0.0, 0.0]

targets_file: targets.yaml

target_dynamics:
  mode: random_priority
  switch_period_sec: 20.0
  priority_weight: 10.0
  background_weight: 1.0
  seed: 2026
  initial_priority_target_id: null
  avoid_immediate_repeat: true

vehicle:
  straight_speed_mps: 0.333333
  turn_radius_m: 0.15
  bank_yaw_rate_rad_s: 2.513274
  turning_path_speed_mps: 0.376991

controller:
  algorithm: heuristic
  control_period_sec: 1.0
  mpc_horizon: 5
  mpc_max_step_m: 0.333333
  minimum_mpc_lookahead_m: 0.30
  deterministic_seed: 42
  distributed_update_semantics: jacobi

waypoint_dispatch:
  refresh_period_sec: 1.0
  active_waypoint_warning_sec: 10.0

communication:
  # Illustrative laboratory defaults; verify against measured radio behavior.
  ideal_range_m: 1.5
  maximum_range_m: 2.0

safety:
  dry_run: true
  minimum_separation_m: 0.35
  controller_result_timeout_sec: 2.5
  geofence:
    # Illustrative laboratory bounds; verify against the available floor area.
    x_min: -4.0
    x_max: 4.0
    y_min: -4.0
    y_max: 4.0

# Omit this section to retain the same static circular synthetic formation.
synthetic_mcs:
  mode: static
  preset: figure_eight
  seed: null
  duration_sec: 120.0
  formation_coupling: rigid
  initial_radius_m: 0.5
  connectivity_policy: enforce
  segment_duration_min_sec: 1.0
  segment_duration_max_sec: 5.0
  process_speed_std_mps: 0.0
  process_yaw_rate_std_rad_s: 0.0
  measurement_position_std_m: 0.0
  measurement_heading_std_rad: 0.0
  maximum_transition_attempts: 50

recording:
  root_directory: null
  profile: core
  storage_id: sqlite3
  pose_source: synthetic
  start_synthetic: true

analysis:
  connectivity_alpha: 5.0
  maximum_interpolation_gap_sec: 0.5
