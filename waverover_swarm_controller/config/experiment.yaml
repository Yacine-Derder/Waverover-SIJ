# Canonical PC experiment configuration. Verify laboratory geometry and radio
# ranges before physical use. Select one exact identifier below; run_experiment
# --algorithm can override it for one run without modifying this file.
frame_id: robotics_lab
robot_ids: ["131", "132", "133", "134", "135", "136"]

pose:
  timeout_sec: 0.5
  maximum_snapshot_skew_sec: 0.1

station:
  id: station_0
  position: [0.0, 0.0]

targets_file: targets_setup_1.yaml

target_dynamics:
  mode: random_priority
  switch_period_sec: 20.0
  priority_weight: 10.0
  background_weight: 1.0
  seed: 2026
  initial_priority_target_id: null
  avoid_immediate_repeat: true

vehicle:
  straight_speed_mps: 0.333333
  turn_radius_m: 0.15
  bank_yaw_rate_rad_s: 2.513274
  turning_path_speed_mps: 0.376991

controller:
  algorithm: heuristic
  common:
    control_period_sec: 1.0
    deterministic_seed: 42
  # Every registered algorithm has one strictly validated parameter block.
  # Empty heuristic blocks are intentional: they use only common parameters.
  algorithms:
    heuristic: {}
    heuristic_decentralized: {}
    convex:
      connectivity_recovery_slack_penalty: 10000.0
    mpc_centralized:
      mpc_horizon: 5
      mpc_max_step_m: 0.333333
      minimum_mpc_lookahead_m: 0.30
      connectivity_recovery_slack_penalty: 10000.0
    mpc_distributed:
      mpc_horizon: 5
      mpc_max_step_m: 0.333333
      minimum_mpc_lookahead_m: 0.30
      distributed_update_semantics: jacobi
      distributed_inter_agent_weight: 2.0
      connectivity_recovery_slack_penalty: 10000.0

waypoint_dispatch:
  refresh_period_sec: 1.0
  active_waypoint_warning_sec: 10.0
  repeated_destination_epsilon_m: 0.05
  completed_destination_reissue_distance_m: 0.30

communication:
  ideal_range_m: 1.0
  maximum_range_m: 1.5

safety:
  dry_run: false
  collision_policy: best_effort
  preferred_separation_m: 0.4
  collision_repair_max_iterations: 50
  controller_result_timeout_sec: 2.5
  geofence:
    x_min: -4.0
    x_max: 4.0
    y_min: -4.0
    y_max: 4.0

synthetic_mcs:
  mode: random_walk
  preset: figure_eight
  seed: 2026
  duration_sec: 120.0
  formation_coupling: independent
  initial_radius_m: 1.0
  connectivity_policy: observe
  segment_duration_min_sec: 1.0
  segment_duration_max_sec: 5.0
  process_speed_std_mps: 0.005
  process_yaw_rate_std_rad_s: 0.01
  measurement_position_std_m: 0.002
  measurement_heading_std_rad: 0.005
  maximum_transition_attempts: 50
  script: []

recording:
  root_directory: /home/derder/waverover_runs
  profile: core
  storage_id: sqlite3
  pose_source: mcs
  start_synthetic: false

analysis:
  connectivity_alpha: 5.0
  maximum_interpolation_gap_sec: 0.5
