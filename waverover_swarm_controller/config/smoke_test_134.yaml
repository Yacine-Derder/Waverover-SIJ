# PC-only example. Communication ranges, geofence, and target coordinates must
# be verified in robotics_lab before any physical experiment.
frame_id: robotics_lab

robot_ids:
  - "134"

pose:
  timeout_sec: 0.5
  maximum_snapshot_skew_sec: 0.1

station:
  id: station_0
  position: [0.0, 0.0]

targets_file: targets.yaml

vehicle:
  straight_speed_mps: 0.333333
  turn_radius_m: 0.15
  bank_yaw_rate_rad_s: 2.513274
  turning_path_speed_mps: 0.376991

controller:
  algorithm: heuristic
  control_period_sec: 1.0
  mpc_horizon: 5
  mpc_max_step_m: 0.333333
  minimum_mpc_lookahead_m: 0.30
  deterministic_seed: 42
  distributed_update_semantics: jacobi

waypoint_dispatch:
  reached_distance_m: 0.15
  handoff_delay_sec: 0.15
  refresh_period_sec: 1.0
  active_waypoint_warning_sec: 10.0

communication:
  # Illustrative laboratory defaults; verify against measured radio behavior.
  ideal_range_m: 1.5
  maximum_range_m: 2.0

safety:
  dry_run: true
  minimum_separation_m: 0.35
  controller_result_timeout_sec: 2.5
  geofence:
    # Illustrative laboratory bounds; verify against the available floor area.
    x_min: -4.0
    x_max: 4.0
    y_min: -4.0
    y_max: 4.0
